version: '3'

services:
  # Database
  db:
    image: mysql:5.7
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: robothistoric
      MYSQL_USER: username
      MYSQL_PASSWORD: password
    networks:
      - rf
  # phpmyadmin
  phpmyadmin:
    depends_on:
      - db
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - '8081:80'
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: password
    networks:
      - rf
  # rfhistoric - build locally with: docker compose build rfhistoric
  rfhistoric:
    depends_on:
      - db
    build: .
    restart: always
    ports:
      - '5000:5000'
    environment:
      SQLHOST: db
      PORT: 3306
      USERNAME: root
      PASSWORD: password
      FLASKHOST: 0.0.0.0
    networks:
      - rf
networks:
  rf:
volumes:
  db_data:
